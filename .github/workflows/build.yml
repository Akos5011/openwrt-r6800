name: Build OpenWrt for Netgear R6800

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  TARGET: ramips
  SUBTARGET: mt7621
  PROFILE: netgear_r6800

jobs:
  build:
    name: Build snapshot
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Clone OpenWrt snapshot
        run: |
          git clone --depth=1 --branch main \
            https://github.com/openwrt/openwrt.git openwrt

      - name: Apply antenna kernel patch
        working-directory: openwrt
        run: |
          mkdir -p package/kernel/mt76/patches
          cp $GITHUB_WORKSPACE/patches/mt76/900-r6800-antenna-3nss.patch \
             package/kernel/mt76/patches/900-r6800-antenna-3nss.patch
          echo "=== Patch file ===" && cat package/kernel/mt76/patches/900-r6800-antenna-3nss.patch

      - name: Apply antenna DTS fix
        working-directory: openwrt
        run: |
          # R6800 DTS now delegates to a shared DTSI — patch that instead
          DTSI=target/linux/ramips/dts/mt7621_netgear_sercomm_bzv.dtsi

          # Fall back to the R6800 DTS directly if the DTSI doesn't exist
          if [ ! -f "$DTSI" ]; then
            DTSI=target/linux/ramips/dts/mt7621_netgear_r6800.dts
          fi

          echo "=== Patching: $DTSI ==="
          echo "=== Before ===" && grep -n "ieee80211-freq-limit\|antenna-mask" "$DTSI" || true

          # Dump the file so we can see the actual node structure in the log
          echo "=== Full DTSI ===" && cat "$DTSI"

          sed -i '/ieee80211-freq-limit = <5000000 6000000>/a \\t\t\tantenna-mask = <0x7>;' "$DTSI"
          sed -i '/ieee80211-freq-limit = <2400000 2500000>/a \\t\t\tantenna-mask = <0x7>;' "$DTSI"

          echo "=== After ===" && grep -n "ieee80211-freq-limit\|antenna-mask" "$DTSI"

          # Fail loudly if neither sed matched anything
          grep -q "antenna-mask" "$DTSI" || \
            { echo "ERROR: antenna-mask not inserted — check node structure above"; exit 1; }
            
      - name: Copy custom files into image
        run: |
          mkdir -p openwrt/files/etc/uci-defaults
          mkdir -p openwrt/files/etc/sysctl.d
          mkdir -p openwrt/files/etc/hotplug.d/iface
          cp files/etc/uci-defaults/99-r6800-zram          openwrt/files/etc/uci-defaults/
          cp files/etc/sysctl.d/10-r6800-network.conf      openwrt/files/etc/sysctl.d/
          echo "=== Files staged ===" && find openwrt/files -type f

      - name: Update & install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Write .config
        working-directory: openwrt
        run: |
          cp $GITHUB_WORKSPACE/.config .config
          make defconfig
          echo "=== Final .config (R6800 relevant lines) ===" 
          grep -E "TARGET|DEVICE_netgear|HIGHMEM|HZ_1000|MIPS32_R2|BBR|CAKE|ZRAM" .config || true

      - name: Download package sources
        working-directory: openwrt
        run: make download -j$(nproc) V=s 2>&1 | tail -20

      - name: Build firmware
        working-directory: openwrt
        run: make -j$(nproc) V=s 2>&1 | tee /tmp/build.log | tail -50

      - name: Re-run single-threaded on failure
        if: failure()
        working-directory: openwrt
        run: make -j1 V=s 2>&1 | tail -150

      - name: Collect firmware
        if: success()
        run: |
          mkdir -p firmware
          find openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/ \
            -name "*netgear_r6800*" -type f \
            -exec cp {} firmware/ \;
          ls -lh firmware/

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: openwrt-r6800-snapshot-${{ github.run_number }}
          path: firmware/
          retention-days: 30

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log-${{ github.run_number }}
          path: /tmp/build.log
          retention-days: 7
